openapi: 3.0.0
info:
  version: "1"
  title: "GptProxy"
  description: >
    Rollun-net facade for GPT Agent Action traffic. Requests are authenticated
    via Basic Auth, authorized by ACL, then proxied to internal proxy service.
    This manifest exposes only resource roots; path segments are forwarded.
servers:
  - url: http://rollun-net-prvt/openapi/GptProxy/v1
  - url: https://rollun.net/api/openapi/GptProxy/v1
tags:
  - name: LightRAG
  - name: Trello
components:
  schemas:
    ProxyResponse:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
    ProxyRequestBody:
      type: object
      description: JSON body to forward to the target Trello endpoint as-is.
    LightragQueryRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: The query text
          minLength: 3
          example: "Hello!"
          maxLength: 5000
        mode:
          type: string
          description: "Query mode"
          enum:
            - local
            - global
            - hybrid
            - naive
            - mix
            - bypass
          default: mix
        only_need_context:
          type: boolean
          description: "If true, only returns the retrieved context without generating a response."
        only_need_prompt:
          type: boolean
          description: "If true, only returns the generated prompt without producing a response."
        response_type:
          type: string
          description: "Defines the response format. Examples: 'Multiple Paragraphs', 'Single Paragraph', 'Bullet Points'."
        top_k:
          type: integer
          minimum: 1
          description: "Number of top items to retrieve."
        stream:
          type: boolean
          description: "If true, enables streaming output."
          default: true
    LightragQueryResponse:
      type: object
      required:
        - response
      properties:
        response:
          type: string
          description: The generated response
paths:
  /trello:
    get:
      tags:
        - Trello
      summary: Proxy Trello request
      description: Proxies requests to Trello based on target_path; all other query params are forwarded as-is.
      operationId: proxyTrello
      parameters:
        - name: target_path
          in: query
          description: Target endpoint path derived from the original request.
          required: true
          schema:
            type: string
        - name: target_query
          in: query
          description: Encoded query string for target request without leading "?".
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Proxied response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyResponse"
    post:
      tags:
        - Trello
      summary: Proxy Trello POST request
      description: >
        Proxies POST requests to Trello based on target_path.
        Forwards JSON body and query params as-is.
        Used for creating cards, comments, members, labels, checklists, check items, attachments.
      operationId: postProxyTrello
      parameters:
        - name: target_path
          in: query
          description: Target endpoint path derived from the original request.
          required: true
          schema:
            type: string
        - name: target_query
          in: query
          description: Encoded query string for target request without leading "?".
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyRequestBody"
      responses:
        "200":
          description: Proxied response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyResponse"
    put:
      tags:
        - Trello
      summary: Proxy Trello PUT request
      description: >
        Proxies PUT requests to Trello based on target_path.
        Forwards JSON body and query params as-is.
        Used for updating cards, comments, check items.
      operationId: putProxyTrello
      parameters:
        - name: target_path
          in: query
          description: Target endpoint path derived from the original request.
          required: true
          schema:
            type: string
        - name: target_query
          in: query
          description: Encoded query string for target request without leading "?".
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProxyRequestBody"
      responses:
        "200":
          description: Proxied response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyResponse"
    delete:
      tags:
        - Trello
      summary: Proxy Trello DELETE request
      description: >
        Proxies DELETE requests to Trello based on target_path.
        Used for removing comments, labels, checklists, check items, attachments.
      operationId: deleteProxyTrello
      parameters:
        - name: target_path
          in: query
          description: Target endpoint path derived from the original request.
          required: true
          schema:
            type: string
        - name: target_query
          in: query
          description: Encoded query string for target request without leading "?".
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Proxied response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyResponse"
  /lightrag/query:
    post:
      tags:
        - LightRAG
      summary: Proxy LightRAG query
      description: Proxies POST query requests to LightRAG service. Forwards JSON body as-is.
      operationId: queryLightrag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LightragQueryRequest"
      responses:
        "200":
          description: LightRAG query response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LightragQueryResponse"