openapi: 3.0.0
info:
  version: "1"
  title: "Sales"
  description: "Generated by Manifests generator v1.5.3. API for Amazon SP-API Sales - order metrics by interval and granularity."
servers:
  - url: http://amz-orders-ngx/openapi/Sales/v1
  - url: http://host.docker.internal:8408/openapi/Sales/v1
  - url: https://rollun.net/api/openapi/Sales/v1
tags:
  - name: OrderMetrics
    description: "Endpoints for retrieving aggregated sales order metrics"

paths:
  "/order-metrics":
    get:
      tags:
        - OrderMetrics
      summary: "Retrieve aggregated sales order metrics for an interval"
      description: |
        Proxies Amazon SP-API GET /sales/v1/orderMetrics. Returns metrics buckets per
        the chosen granularity. Empty `data` means there were no sales for the
        interval - this is a 200 success, not 404.

        ### Live example (real SKU)
        ```bash
        curl --location --request GET \
          'http://localhost:8280/openapi/Sales/v1/order-metrics?marketplaceId=ATVPDKIKX0DER&fromDate=2025-05-07T00%3A00%3A00Z&toDate=2026-05-07T00%3A00%3A00Z&granularity=Week&fulfillmentNetwork=AFN&sku=VZ-DDDZ-GHBT'
        ```

        Returns ~53 weekly buckets; non-zero weeks contain real order counts and
        totals for SKU `VZ-DDDZ-GHBT` over the past year.
      parameters:
        - in: query
          name: marketplaceId
          description: "Marketplace identifier. Amazon SP-API allows only one marketplace per call."
          required: true
          schema:
            type: string
            example: "ATVPDKIKX0DER"
        - in: query
          name: fromDate
          description: "Interval start (inclusive). ISO-8601 absolute time, either Z notation or numeric offset."
          required: true
          schema:
            type: string
            example: "2025-05-07T00:00:00Z"
        - in: query
          name: toDate
          description: "Interval end (exclusive). ISO-8601 absolute time. Must use the same notation/offset as `fromDate`."
          required: true
          schema:
            type: string
            example: "2026-05-07T00:00:00Z"
        - in: query
          name: granularity
          description: "Time bucket size for the metrics."
          required: true
          schema:
            type: string
            enum:
              - Hour
              - Day
              - Week
              - Month
              - Year
              - Total
            example: "Week"
        - in: query
          name: granularityTimeZone
          description: "IANA-compatible time zone for day boundaries. Required by Amazon when granularity > Hour and the interval is not in Z notation."
          required: false
          schema:
            type: string
            example: "UTC"
        - in: query
          name: fulfillmentNetwork
          description: "Filter by fulfillment network. AFN = FBA, MFN = merchant-fulfilled."
          required: false
          schema:
            type: string
            enum:
              - AFN
              - MFN
            example: "AFN"
        - in: query
          name: buyerType
          description: "Filter by buyer type."
          required: false
          schema:
            type: string
            enum:
              - All
              - B2B
              - B2C
            example: "All"
        - in: query
          name: firstDayOfWeek
          description: "Week boundary when granularity=Week."
          required: false
          schema:
            type: string
            enum:
              - Monday
              - Sunday
            example: "Monday"
        - in: query
          name: sku
          description: "Filter by SKU. Mutually exclusive with `asin` - if both supplied, `sku` wins."
          required: false
          schema:
            type: string
            example: "VZ-DDDZ-GHBT"
        - in: query
          name: asin
          description: "Filter by ASIN. Mutually exclusive with `sku`."
          required: false
          schema:
            type: string
            example: "B07XYZ1234"
      responses:
        "200":
          description: "Request processed successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOrderMetricsResult"
        "500":
          description: "An internal server error occurred."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'

components:
  schemas:
    ErrorResult:
      type: object
      description: "Represents an error response, including detailed error messages."
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"

    Message:
      type: object
      description: "Details about an error or informational message."
      properties:
        level:
          type: string
          enum:
            - emergency
            - alert
            - critical
            - error
            - warning
            - notice
            - info
          description: "The severity level of the message."
        type:
          type: string
          enum:
            - UNDEFINED
            - LOGGER_MESSAGE
          description: "The type of message. Defaults to LOGGER_MESSAGE if not specified."
        text:
          type: string
          description: "A detailed description of the message."

    SuccessResult:
      allOf:
        - $ref: '#/components/schemas/ErrorResult'
      type: object
      description: "Represents a successful response, optionally including additional data."
      required:
        - data
      properties:
        data:
          type: object
          description: "Response-specific data."

    GetOrderMetricsResult:
      allOf:
        - $ref: '#/components/schemas/SuccessResult'
      type: object
      description: "Result of GetOrderMetrics. `data` is an array - one entry per bucket of the requested granularity. Empty array is a normal success."
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderMetricItem'

    OrderMetricItem:
      type: object
      required:
        - interval
        - unitCount
        - orderItemCount
        - orderCount
        - averageUnitPrice
        - totalSales
      properties:
        interval:
          type: string
          example: "2025-06-09T00:00Z--2025-06-16T00:00Z"
          description: "The time interval covered by this bucket."
        unitCount:
          type: integer
          example: 9
          description: "Number of units sold."
        orderItemCount:
          type: integer
          example: 9
          description: "Number of order items."
        orderCount:
          type: integer
          example: 9
          description: "Number of orders."
        averageUnitPrice:
          $ref: '#/components/schemas/Money'
        totalSales:
          $ref: '#/components/schemas/Money'

    Money:
      type: object
      required:
        - amount
        - currencyCode
      properties:
        amount:
          type: number
          example: 15.86
          description: "Monetary amount."
        currencyCode:
          type: string
          example: "USD"
          description: "ISO 4217 currency code."
