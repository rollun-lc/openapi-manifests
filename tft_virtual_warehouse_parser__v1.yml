openapi: 3.0.0
info:
  version: "1"
  title: "TftVirtualWarehouseParser"
  description: "Generated by Manifests generator v1.5.3. API for live Turn14/TFT portal virtual warehouse inventory parsing."

servers:
  - url: http://tft-parser/openapi/TftVirtualWarehouseParser/v1
  - url: http://host.docker.internal:8414/openapi/TftVirtualWarehouseParser/v1
  - url: http://localhost:8414/openapi/TftVirtualWarehouseParser/v1

tags:
  - name: Sync
  - name: Inventory
  - name: Status

paths:
  /sync:
    post:
      tags:
        - Sync
      summary: "Synchronize Turn14 virtual inventory"
      description: "Logs into the Turn14 portal, downloads the current virtual inventory page, parses and validates the HTML table, and returns the live JSON result without saving a snapshot."
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncRequest"
      responses:
        "200":
          description: "Inventory synchronized or dry-run validated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
        "422":
          description: "Turn14 page structure or inventory data failed validation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResult"
        "500":
          description: "Internal error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResult"

  /inventory:
    get:
      tags:
        - Inventory
      summary: "Fetch current inventory"
      parameters:
        - in: query
          name: includeItems
          required: false
          schema:
            type: boolean
            default: true
          description: "When false, returns only live fetch metadata and item_count."
      responses:
        "200":
          description: "Current live inventory"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryResult"
        "500":
          description: "Internal error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResult"

  /status:
    get:
      tags:
        - Status
      summary: "Get parser service status"
      responses:
        "200":
          description: "Current parser service status"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResult"
        "500":
          description: "Internal error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResult"

components:
  schemas:
    ErrorResult:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      description: "Message field is not required"

    Message:
      type: object
      properties:
        level:
          type: string
          description: "Message level, compatible with logger levels"
          enum: [emergency, alert, critical, error, warning, notice, info, debug]
        type:
          type: string
          description: "Type of message for client parsing"
          enum:
            - UNDEFINED
            - LOGGER_MESSAGE
            - LOGIN_FAILED
            - FETCH_FAILED
            - HTML_STRUCTURE_CHANGED
            - INVENTORY_VALIDATION_FAILED
            - STORAGE_FAILED
            - SNAPSHOT_NOT_FOUND
        text:
          type: string
          description: "Message describing what went wrong"

    SuccessResult:
      allOf:
        - $ref: "#/components/schemas/ErrorResult"
      type: object
      properties:
        data:
          type: object

    SyncRequest:
      type: object
      properties:
        dryRun:
          type: boolean
          default: false
          description: "Compatibility flag. The PHP service is always live/stateless and never writes inventory or status files."
        includeItems:
          type: boolean
          default: true
          description: "When false, omits items from the response."
        expectedItemCount:
          type: integer
          nullable: true
          minimum: 0
          description: "Optional strict expected item count. The sync fails when the parsed count differs."
        minItemCount:
          type: integer
          default: 0
          minimum: 0
          description: "Minimum accepted item count. Use this to prevent accidentally accepting an empty or truncated table."
        failOnUnknownWarehouses:
          type: boolean
          default: false
          description: "When true, the sync fails if the table contains warehouse codes outside the configured known set."
        knownWarehouseCodes:
          type: array
          nullable: true
          description: "Optional allowed warehouse code list. Defaults to PA, TX, IN, NV."
          items:
            type: string
            example: "PA"

    SyncResult:
      allOf:
        - $ref: "#/components/schemas/SuccessResult"
      type: object
      properties:
        data:
          $ref: "#/components/schemas/SyncSummary"

    InventoryResult:
      allOf:
        - $ref: "#/components/schemas/SuccessResult"
      type: object
      properties:
        data:
          $ref: "#/components/schemas/InventorySnapshot"

    StatusResult:
      allOf:
        - $ref: "#/components/schemas/SuccessResult"
      type: object
      properties:
        data:
          $ref: "#/components/schemas/SyncStatus"

    SyncSummary:
      type: object
      required:
        - fetched_at
        - source
        - item_count
        - validation
      properties:
        fetched_at:
          type: string
          format: date-time
          example: "2026-06-26T12:18:23Z"
        source:
          type: string
          example: "turn14_virtual_inventory"
        item_count:
          type: integer
          minimum: 0
          example: 9
        validation:
          $ref: "#/components/schemas/ValidationReport"
        items:
          type: array
          items:
            $ref: "#/components/schemas/VirtualInventoryItem"

    InventorySnapshot:
      type: object
      required:
        - fetched_at
        - source
      properties:
        fetched_at:
          type: string
          format: date-time
          example: "2026-06-26T12:18:23Z"
        source:
          type: string
          example: "turn14_virtual_inventory"
        item_count:
          type: integer
          minimum: 0
          example: 9
        items:
          type: array
          items:
            $ref: "#/components/schemas/VirtualInventoryItem"

    VirtualInventoryItem:
      type: object
      required:
        - item_id
        - part_number
        - description
        - manufacturer
        - stock_total
        - stock_by_warehouse
        - inventory_date
        - avg_price
        - image
        - reserve_ids
      properties:
        item_id:
          type: string
          example: "614715"
        part_number:
          type: string
          example: "dun45605418"
        description:
          type: string
          example: "Dunlop D404 Rear Tire - 170/80-15 M/C 77H TL"
        manufacturer:
          type: string
          example: "Dunlop"
        stock_total:
          type: integer
          minimum: 0
          example: 30
        stock_pa:
          type: integer
          minimum: 0
          example: 0
          description: "Compatibility field for Pennsylvania stock. Zero when missing from the source table."
        stock_tx:
          type: integer
          minimum: 0
          example: 9
          description: "Compatibility field for Texas stock. Zero when missing from the source table."
        stock_in:
          type: integer
          minimum: 0
          example: 9
          description: "Compatibility field for Indiana stock. Zero when missing from the source table."
        stock_nv:
          type: integer
          minimum: 0
          example: 12
          description: "Compatibility field for Nevada stock. Zero when missing from the source table."
        stock_by_warehouse:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
          example:
            PA: 0
            TX: 9
            IN: 9
            NV: 12
          description: "All warehouse stock values discovered in the HTML row. This map preserves newly added Turn14 warehouse codes."
        inventory_date:
          type: string
          example: "04/30/2026"
          description: "Date exactly as shown by the Turn14 portal, expected MM/DD/YYYY."
        avg_price:
          type: number
          minimum: 0
          example: 111.23
        image:
          type: string
          example: "https://d32vzsop7y1h3k.cloudfront.net/9ec8e3141db598042973201ed948b8fc.JPG"
        reserve_ids:
          type: string
          example: "120268,120281,120266,120262"

    ValidationReport:
      type: object
      required:
        - table_rows
        - parsed_items
        - headers_ok
        - stock_totals_ok
        - required_fields_ok
        - server_side_pagination_detected
        - unknown_warehouse_codes
      properties:
        table_rows:
          type: integer
          minimum: 0
          example: 9
        parsed_items:
          type: integer
          minimum: 0
          example: 9
        headers_ok:
          type: boolean
          example: true
        stock_totals_ok:
          type: boolean
          example: true
        required_fields_ok:
          type: boolean
          example: true
        server_side_pagination_detected:
          type: boolean
          example: false
        known_warehouse_codes:
          type: array
          items:
            type: string
          example: [PA, TX, IN, NV]
        unknown_warehouse_codes:
          type: array
          items:
            type: string
          example: []
        warnings:
          type: array
          items:
            type: string
          example: []

    SyncStatus:
      type: object
      required:
        - mode
        - cache_enabled
        - item_count
      properties:
        mode:
          type: string
          example: "live"
        cache_enabled:
          type: boolean
          example: false
        last_success_at:
          type: string
          nullable: true
          format: date-time
          example: null
          description: "Always null while the service runs without cache."
        last_error_at:
          type: string
          nullable: true
          format: date-time
          example: null
          description: "Always null while the service runs without persisted status."
        last_error:
          type: string
          nullable: true
          example: null
          description: "Always null while the service runs without persisted status."
        item_count:
          type: integer
          minimum: 0
          example: 0
          description: "Always 0 on the status endpoint because inventory is fetched per request."
